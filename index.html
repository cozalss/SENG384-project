<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HEALTH AI — European HealthTech Co-Creation & Innovation Platform. Connect healthcare professionals with engineers for structured, GDPR-compliant collaboration." />
    <meta name="keywords" content="health tech, innovation, co-creation, medical, engineering, collaboration, GDPR" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Establish early TLS to Firebase so the first auth/firestore call lands
         on a warm connection. Saves ~200-400 ms on a cold load over slow links. -->
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
    <!-- Async-load the font CSS — avoids the render-blocking <link rel="stylesheet">
         while still rendering text in the chosen family once it arrives. The
         <noscript> fallback covers users without JS. -->
    <link
        rel="preload"
        as="style"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>
    <title>HEALTH AI — Co-Creation & Innovation Platform</title>
    <script>
      // Snap the first paint: suppress CSS animations/transitions until React
      // mounts and lifts this class. Prevents the "big whole-page fade-in"
      // that happens on hard refresh.
      document.documentElement.classList.add('no-anim-initial');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
